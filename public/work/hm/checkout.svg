<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#16140f" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#f4f1ea"/>
  <text x="100" y="100" fill="#E1130E" font-size="18" letter-spacing="5" font-weight="700">CHECKOUT</text>
  <text x="98" y="150" fill="#16140f" font-size="44" font-weight="700" letter-spacing="-1">A streamlined three-step checkout</text>

  <!-- three phone steps -->
  <g font-family="Helvetica Neue, Arial, sans-serif">
    <!-- step 1 bag -->
    <g transform="translate(150,250)" filter="url(#sh)">
      <rect width="300" height="600" rx="40" fill="#15130f"/>
      <rect x="12" y="14" width="276" height="572" rx="30" fill="#fff"/>
      <text x="30" y="58" fill="#16140f" font-size="18" font-weight="700">Your bag</text>
      <g><rect x="30" y="80" width="62" height="80" rx="8" fill="#e6e0d3"/><rect x="104" y="92" width="120" height="11" rx="5" fill="#ded7c9"/><rect x="104" y="112" width="80" height="11" rx="5" fill="#ece6d9"/><text x="104" y="150" fill="#E1130E" font-size="13" font-weight="700">$ 29.99</text></g>
      <g><rect x="30" y="180" width="62" height="80" rx="8" fill="#e3ddd0"/><rect x="104" y="192" width="120" height="11" rx="5" fill="#ded7c9"/><rect x="104" y="212" width="80" height="11" rx="5" fill="#ece6d9"/><text x="104" y="250" fill="#E1130E" font-size="13" font-weight="700">$ 19.99</text></g>
      <line x1="30" y1="300" x2="270" y2="300" stroke="#efe9df"/>
      <text x="30" y="330" fill="#8a847c" font-size="13">Subtotal</text><text x="270" y="330" fill="#16140f" font-size="13" text-anchor="end" font-weight="600">$ 49.98</text>
      <text x="30" y="356" fill="#8a847c" font-size="13">Shipping</text><text x="270" y="356" fill="#16140f" font-size="13" text-anchor="end" font-weight="600">Free</text>
      <rect x="30" y="510" width="240" height="50" rx="25" fill="#16140f"/><text x="150" y="541" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Continue</text>
    </g>
    <!-- step 2 details -->
    <g transform="translate(650,250)" filter="url(#sh)">
      <rect width="300" height="600" rx="40" fill="#15130f"/>
      <rect x="12" y="14" width="276" height="572" rx="30" fill="#fff"/>
      <text x="30" y="58" fill="#16140f" font-size="18" font-weight="700">Delivery</text>
      <rect x="30" y="80" width="240" height="44" rx="10" fill="#f0ece5"/><text x="44" y="107" fill="#a39d92" font-size="13">Full name</text>
      <rect x="30" y="134" width="240" height="44" rx="10" fill="#f0ece5"/><text x="44" y="161" fill="#a39d92" font-size="13">Address</text>
      <rect x="30" y="188" width="114" height="44" rx="10" fill="#f0ece5"/><text x="44" y="215" fill="#a39d92" font-size="13">City</text>
      <rect x="156" y="188" width="114" height="44" rx="10" fill="#f0ece5"/><text x="170" y="215" fill="#a39d92" font-size="13">Postcode</text>
      <text x="30" y="270" fill="#8a847c" font-size="12" letter-spacing="2">DELIVERY OPTION</text>
      <rect x="30" y="282" width="240" height="50" rx="12" fill="#fff" stroke="#16140f" stroke-width="2"/><circle cx="52" cy="307" r="7" fill="#E1130E"/><text x="70" y="305" fill="#16140f" font-size="13" font-weight="600">Standard · Free</text><text x="70" y="322" fill="#8a847c" font-size="11">3–5 business days</text>
      <rect x="30" y="342" width="240" height="50" rx="12" fill="#f7f4ee"/><circle cx="52" cy="367" r="7" fill="none" stroke="#c9c3b8" stroke-width="2"/><text x="70" y="365" fill="#16140f" font-size="13" font-weight="600">Express · $ 6.99</text><text x="70" y="382" fill="#8a847c" font-size="11">1–2 business days</text>
      <rect x="30" y="510" width="240" height="50" rx="25" fill="#16140f"/><text x="150" y="541" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Continue to payment</text>
    </g>
    <!-- step 3 confirm -->
    <g transform="translate(1150,250)" filter="url(#sh)">
      <rect width="300" height="600" rx="40" fill="#15130f"/>
      <rect x="12" y="14" width="276" height="572" rx="30" fill="#fff"/>
      <circle cx="150" cy="170" r="46" fill="#fbeceb"/><circle cx="150" cy="170" r="30" fill="#E1130E"/><path d="M137 170 l9 9 l18 -20" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="150" y="260" fill="#16140f" font-size="20" font-weight="700" text-anchor="middle">Order confirmed</text>
      <text x="150" y="288" fill="#8a847c" font-size="13" text-anchor="middle">A receipt is on its way.</text>
      <rect x="30" y="330" width="240" height="44" rx="10" fill="#f7f4ee"/><text x="44" y="357" fill="#8a847c" font-size="12">Order</text><text x="256" y="357" fill="#16140f" font-size="12" text-anchor="end" font-weight="700">#HM-48217</text>
      <rect x="30" y="384" width="240" height="44" rx="10" fill="#f7f4ee"/><text x="44" y="411" fill="#8a847c" font-size="12">Arrives</text><text x="256" y="411" fill="#16140f" font-size="12" text-anchor="end" font-weight="700">Thu, 12 Sep</text>
      <rect x="30" y="510" width="240" height="50" rx="25" fill="#16140f"/><text x="150" y="541" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Track order</text>
    </g>
  </g>

  <!-- step labels -->
  <g fill="#8a847c" font-size="15" letter-spacing="2" text-anchor="middle">
    <text x="300" y="905">1 · BAG</text><text x="800" y="905">2 · DELIVERY</text><text x="1300" y="905">3 · CONFIRMATION</text>
  </g>
</svg>
