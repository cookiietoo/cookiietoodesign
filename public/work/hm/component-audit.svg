<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="1600" height="1000" fill="#f4f1ea"/>
  <text x="100" y="100" fill="#E1130E" font-size="18" letter-spacing="5" font-weight="700">COMPONENT AUDIT</text>
  <text x="98" y="150" fill="#16140f" font-size="44" font-weight="700" letter-spacing="-1">Fragmented patterns, brought into one system</text>

  <!-- BEFORE panel -->
  <g transform="translate(100,230)">
    <rect width="640" height="600" rx="20" fill="#fbf3f2"/>
    <text x="32" y="56" fill="#E1130E" font-size="18" font-weight="700" letter-spacing="2">BEFORE — INCONSISTENT</text>
    <!-- mismatched buttons -->
    <rect x="40" y="90" width="150" height="40" rx="6" fill="#16140f"/><text x="115" y="116" fill="#fff" font-size="13" text-anchor="middle">Buy now</text>
    <rect x="210" y="86" width="170" height="48" rx="24" fill="#c0140f"/><text x="295" y="116" fill="#fff" font-size="14" text-anchor="middle">Buy Now</text>
    <rect x="400" y="92" width="140" height="36" rx="18" fill="#e23" /><text x="470" y="116" fill="#fff" font-size="12" text-anchor="middle">BUY</text>
    <!-- mismatched cards -->
    <rect x="40" y="170" width="150" height="180" rx="6" fill="#fff" stroke="#e7d6d4"/><rect x="56" y="186" width="118" height="100" rx="4" fill="#ece6d9"/>
    <rect x="210" y="170" width="170" height="200" rx="18" fill="#fff" stroke="#e7d6d4"/><rect x="226" y="186" width="138" height="120" rx="12" fill="#ece6d9"/>
    <rect x="400" y="170" width="140" height="160" rx="2" fill="#fff" stroke="#e7d6d4"/><rect x="414" y="184" width="112" height="92" fill="#ece6d9"/>
    <!-- mismatched inputs -->
    <rect x="40" y="400" width="230" height="40" rx="4" fill="#fff" stroke="#d8cfc0"/>
    <rect x="290" y="396" width="250" height="48" rx="24" fill="#f0ece5"/>
    <text x="40" y="500" fill="#b06" font-size="14">12 button styles · 7 card variants · 5 input styles</text>
    <text x="40" y="528" fill="#8a847c" font-size="13">Divergence between iOS and Android builds.</text>
  </g>

  <!-- arrow -->
  <g transform="translate(800,530)"><line x1="-30" y1="0" x2="40" y2="0" stroke="#E1130E" stroke-width="5"/><path d="M40 0 L22 -12 L22 12 Z" fill="#E1130E"/></g>

  <!-- AFTER panel -->
  <g transform="translate(860,230)">
    <rect width="640" height="600" rx="20" fill="#f3f7f1"/>
    <text x="32" y="56" fill="#2e7d32" font-size="18" font-weight="700" letter-spacing="2">AFTER — ALIGNED SYSTEM</text>
    <!-- consistent buttons -->
    <rect x="40" y="88" width="160" height="46" rx="23" fill="#16140f"/><text x="120" y="117" fill="#fff" font-size="14" text-anchor="middle" font-weight="600">Primary</text>
    <rect x="220" y="88" width="160" height="46" rx="23" fill="#fff" stroke="#16140f" stroke-width="2"/><text x="300" y="117" fill="#16140f" font-size="14" text-anchor="middle" font-weight="600">Secondary</text>
    <rect x="400" y="88" width="110" height="46" rx="23" fill="#fbeceb"/><text x="455" y="117" fill="#E1130E" font-size="14" text-anchor="middle" font-weight="700">Tag</text>
    <!-- consistent cards -->
    <g>
      <rect x="40" y="170" width="150" height="190" rx="12" fill="#fff" stroke="#e3ddd0"/><rect x="56" y="186" width="118" height="120" rx="8" fill="#e3ddd0"/><rect x="56" y="318" width="90" height="9" rx="4" fill="#cfc8b9"/><rect x="56" y="334" width="50" height="9" rx="4" fill="#E1130E"/>
      <rect x="210" y="170" width="150" height="190" rx="12" fill="#fff" stroke="#e3ddd0"/><rect x="226" y="186" width="118" height="120" rx="8" fill="#e6e0d3"/><rect x="226" y="318" width="90" height="9" rx="4" fill="#cfc8b9"/><rect x="226" y="334" width="50" height="9" rx="4" fill="#E1130E"/>
      <rect x="380" y="170" width="150" height="190" rx="12" fill="#fff" stroke="#e3ddd0"/><rect x="396" y="186" width="118" height="120" rx="8" fill="#e1dacc"/><rect x="396" y="318" width="90" height="9" rx="4" fill="#cfc8b9"/><rect x="396" y="334" width="50" height="9" rx="4" fill="#E1130E"/>
    </g>
    <!-- consistent inputs -->
    <rect x="40" y="400" width="490" height="46" rx="12" fill="#f0ece5"/><text x="58" y="429" fill="#a39d92" font-size="14">Unified input · one spec</text>
    <text x="40" y="500" fill="#2e7d32" font-size="14" font-weight="700">1 button system · 1 card · 1 input · shared tokens</text>
    <text x="40" y="528" fill="#8a847c" font-size="13">Single source of truth across iOS and Android.</text>
  </g>
</svg>
