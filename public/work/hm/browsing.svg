<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#16140f" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#f4f1ea"/>
  <text x="100" y="100" fill="#E1130E" font-size="18" letter-spacing="5" font-weight="700">PRODUCT BROWSING</text>
  <text x="98" y="150" fill="#16140f" font-size="44" font-weight="700" letter-spacing="-1">From cluttered discovery to a calm, scannable grid</text>

  <!-- BEFORE -->
  <text x="300" y="235" fill="#8a847c" font-size="18" letter-spacing="3" text-anchor="middle">BEFORE</text>
  <g transform="translate(150,260)" filter="url(#sh)">
    <rect x="0" y="0" width="300" height="600" rx="40" fill="#15130f"/>
    <rect x="12" y="14" width="276" height="572" rx="30" fill="#ffffff"/>
    <rect x="30" y="40" width="180" height="20" rx="6" fill="#ded7c9"/>
    <!-- busy banners -->
    <rect x="30" y="74" width="240" height="40" rx="8" fill="#f3d6d4"/><text x="44" y="99" fill="#E1130E" font-size="13" font-weight="700">SALE -50% MEGA DEAL!!</text>
    <rect x="30" y="124" width="240" height="26" rx="6" fill="#efe9df"/>
    <!-- dense uneven cards -->
    <rect x="30" y="162" width="74" height="110" rx="8" fill="#e7e1d4"/>
    <rect x="112" y="162" width="74" height="90" rx="8" fill="#e2dccd"/>
    <rect x="194" y="162" width="74" height="120" rx="8" fill="#e7e1d4"/>
    <rect x="30" y="284" width="110" height="70" rx="8" fill="#e2dccd"/>
    <rect x="150" y="266" width="118" height="100" rx="8" fill="#e7e1d4"/>
    <rect x="30" y="366" width="74" height="96" rx="8" fill="#e2dccd"/>
    <rect x="112" y="380" width="74" height="82" rx="8" fill="#e7e1d4"/>
    <rect x="194" y="366" width="74" height="104" rx="8" fill="#e2dccd"/>
    <rect x="30" y="486" width="240" height="34" rx="8" fill="#f3d6d4"/>
  </g>

  <!-- arrow -->
  <g transform="translate(800,560)"><line x1="-40" y1="0" x2="40" y2="0" stroke="#E1130E" stroke-width="4"/><path d="M40 0 L24 -10 L24 10 Z" fill="#E1130E"/></g>

  <!-- AFTER -->
  <text x="1140" y="235" fill="#E1130E" font-size="18" letter-spacing="3" text-anchor="middle" font-weight="700">AFTER</text>
  <g transform="translate(990,260)" filter="url(#sh)">
    <rect x="0" y="0" width="300" height="600" rx="40" fill="#15130f"/>
    <rect x="12" y="14" width="276" height="572" rx="30" fill="#ffffff"/>
    <text x="30" y="58" fill="#E1130E" font-size="22" font-weight="800">H&amp;M</text>
    <rect x="170" y="40" width="98" height="26" rx="13" fill="#f0ece5"/><text x="219" y="58" fill="#8a847c" font-size="11" text-anchor="middle">Filter · Sort</text>
    <!-- clean 2-col grid -->
    <g>
      <rect x="30" y="86" width="112" height="150" rx="10" fill="#f3efe8"/><rect x="42" y="98" width="88" height="98" rx="6" fill="#e3ddd0"/><rect x="42" y="206" width="70" height="9" rx="4" fill="#cfc8b9"/><rect x="42" y="220" width="44" height="9" rx="4" fill="#E1130E"/>
      <rect x="156" y="86" width="112" height="150" rx="10" fill="#f3efe8"/><rect x="168" y="98" width="88" height="98" rx="6" fill="#e6e0d3"/><rect x="168" y="206" width="70" height="9" rx="4" fill="#cfc8b9"/><rect x="168" y="220" width="44" height="9" rx="4" fill="#E1130E"/>
      <rect x="30" y="252" width="112" height="150" rx="10" fill="#f3efe8"/><rect x="42" y="264" width="88" height="98" rx="6" fill="#e1dacc"/><rect x="42" y="372" width="70" height="9" rx="4" fill="#cfc8b9"/><rect x="42" y="386" width="44" height="9" rx="4" fill="#E1130E"/>
      <rect x="156" y="252" width="112" height="150" rx="10" fill="#f3efe8"/><rect x="168" y="264" width="88" height="98" rx="6" fill="#e4ded0"/><rect x="168" y="372" width="70" height="9" rx="4" fill="#cfc8b9"/><rect x="168" y="386" width="44" height="9" rx="4" fill="#E1130E"/>
      <rect x="30" y="418" width="112" height="120" rx="10" fill="#f3efe8"/><rect x="42" y="430" width="88" height="80" rx="6" fill="#e3ddd0"/>
      <rect x="156" y="418" width="112" height="120" rx="10" fill="#f3efe8"/><rect x="168" y="430" width="88" height="80" rx="6" fill="#e6e0d3"/>
    </g>
  </g>
</svg>
