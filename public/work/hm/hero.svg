<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="34" flood-color="#16140f" flood-opacity="0.14"/>
    </filter>
    <filter id="sh2" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#16140f" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#f4f1ea"/>
  <circle cx="1320" cy="230" r="400" fill="#ece6da"/>
  <circle cx="300" cy="860" r="260" fill="#efe9dd"/>

  <!-- label + title -->
  <g>
    <text x="120" y="150" fill="#E1130E" font-size="20" letter-spacing="6" font-weight="700">H&amp;M — CASE STUDY</text>
    <text x="116" y="300" fill="#16140f" font-size="96" font-weight="700" letter-spacing="-4">Global mobile</text>
    <text x="116" y="400" fill="#16140f" font-size="96" font-weight="700" letter-spacing="-4">shopping</text>
    <text x="120" y="470" fill="#8a847c" font-size="26">Discovery · Browsing · Size · Checkout</text>
  </g>

  <!-- phone -->
  <g transform="translate(940,150)" filter="url(#sh)">
    <rect x="0" y="0" width="320" height="660" rx="44" fill="#15130f"/>
    <rect x="14" y="16" width="292" height="628" rx="32" fill="#ffffff"/>
    <!-- status -->
    <text x="34" y="52" fill="#16140f" font-size="14" font-weight="600">9:41</text>
    <circle cx="276" cy="47" r="4" fill="#16140f"/><circle cx="262" cy="47" r="4" fill="#16140f"/><circle cx="248" cy="47" r="4" fill="#c9c3b8"/>
    <!-- logo -->
    <text x="34" y="98" fill="#E1130E" font-size="30" font-weight="800" letter-spacing="-1">H&amp;M</text>
    <rect x="214" y="80" width="74" height="26" rx="13" fill="#f0ece5"/>
    <text x="251" y="98" fill="#8a847c" font-size="12" text-anchor="middle">Sign in</text>
    <!-- search -->
    <rect x="34" y="118" width="252" height="34" rx="17" fill="#f0ece5"/>
    <circle cx="54" cy="135" r="6" fill="none" stroke="#8a847c" stroke-width="2"/><line x1="58" y1="139" x2="63" y2="144" stroke="#8a847c" stroke-width="2"/>
    <text x="72" y="140" fill="#a39d92" font-size="13">Search for products</text>
    <!-- grid -->
    <g>
      <!-- card -->
      <g transform="translate(34,172)"><rect width="116" height="158" rx="10" fill="#f3efe8"/><rect x="14" y="14" width="88" height="96" rx="6" fill="#e3ddd0"/><rect x="38" y="30" width="40" height="64" rx="4" fill="#cfc8b9"/><text x="14" y="130" fill="#16140f" font-size="11" font-weight="600">Oversized Tee</text><text x="14" y="146" fill="#E1130E" font-size="11" font-weight="700">$ 19.99</text></g>
      <g transform="translate(170,172)"><rect width="116" height="158" rx="10" fill="#f3efe8"/><rect x="14" y="14" width="88" height="96" rx="6" fill="#e6e0d3"/><rect x="40" y="28" width="36" height="68" rx="4" fill="#c4bdad"/><text x="14" y="130" fill="#16140f" font-size="11" font-weight="600">Wide Trousers</text><text x="14" y="146" fill="#E1130E" font-size="11" font-weight="700">$ 34.99</text></g>
      <g transform="translate(34,344)"><rect width="116" height="158" rx="10" fill="#f3efe8"/><rect x="14" y="14" width="88" height="96" rx="6" fill="#e1dacc"/><rect x="36" y="30" width="44" height="64" rx="4" fill="#d2cabb"/><text x="14" y="130" fill="#16140f" font-size="11" font-weight="600">Knit Sweater</text><text x="14" y="146" fill="#E1130E" font-size="11" font-weight="700">$ 29.99</text></g>
      <g transform="translate(170,344)"><rect width="116" height="158" rx="10" fill="#f3efe8"/><rect x="14" y="14" width="88" height="96" rx="6" fill="#e4 ded0"/><rect x="14" y="14" width="88" height="96" rx="6" fill="#e4ded0"/><rect x="38" y="26" width="40" height="70" rx="4" fill="#c8c0b0"/><text x="14" y="130" fill="#16140f" font-size="11" font-weight="600">Denim Jacket</text><text x="14" y="146" fill="#E1130E" font-size="11" font-weight="700">$ 49.99</text></g>
    </g>
    <!-- tab bar -->
    <rect x="14" y="592" width="292" height="52" rx="0" fill="#ffffff"/>
    <line x1="14" y1="592" x2="306" y2="592" stroke="#efe9df" stroke-width="1"/>
    <circle cx="70" cy="618" r="4" fill="#16140f"/><circle cx="130" cy="618" r="4" fill="#c9c3b8"/><circle cx="190" cy="618" r="4" fill="#c9c3b8"/><circle cx="250" cy="618" r="4" fill="#c9c3b8"/>
  </g>

  <!-- floating chips -->
  <g font-size="16" font-weight="600" fill="#16140f">
    <g filter="url(#sh2)"><rect x="760" y="250" width="150" height="48" rx="24" fill="#fff"/><circle cx="788" cy="274" r="6" fill="#E1130E"/><text x="806" y="280">Browse</text></g>
    <g filter="url(#sh2)"><rect x="700" y="470" width="150" height="48" rx="24" fill="#fff"/><circle cx="728" cy="494" r="6" fill="#E1130E"/><text x="746" y="500">Size guide</text></g>
    <g filter="url(#sh2)"><rect x="780" y="690" width="160" height="48" rx="24" fill="#fff"/><circle cx="808" cy="714" r="6" fill="#E1130E"/><text x="826" y="720">Checkout</text></g>
  </g>
</svg>
