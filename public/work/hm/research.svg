<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#16140f" flood-opacity="0.10"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="#f4f1ea"/>
  <text x="100" y="100" fill="#E1130E" font-size="18" letter-spacing="5" font-weight="700">RESEARCH</text>
  <text x="98" y="150" fill="#16140f" font-size="44" font-weight="700" letter-spacing="-1">Mapping the core shopping journey</text>

  <!-- methods row -->
  <g transform="translate(100,210)">
    <g filter="url(#sh)"><rect width="330" height="92" rx="14" fill="#fff"/><text x="24" y="40" fill="#16140f" font-size="17" font-weight="700">Interviews</text><text x="24" y="68" fill="#8a847c" font-size="14">Goals, frustrations, mental models</text></g>
    <g transform="translate(360,0)" filter="url(#sh)"><rect width="330" height="92" rx="14" fill="#fff"/><text x="24" y="40" fill="#16140f" font-size="17" font-weight="700">Behavioural data</text><text x="24" y="68" fill="#8a847c" font-size="14">Funnels, drop-off, search analytics</text></g>
    <g transform="translate(720,0)" filter="url(#sh)"><rect width="330" height="92" rx="14" fill="#fff"/><text x="24" y="40" fill="#16140f" font-size="17" font-weight="700">Usability reviews</text><text x="24" y="68" fill="#8a847c" font-size="14">Heuristic audit of key flows</text></g>
  </g>

  <!-- journey map -->
  <g transform="translate(100,360)">
    <rect width="1400" height="520" rx="20" fill="#fbf8f2"/>
    <text x="32" y="48" fill="#16140f" font-size="20" font-weight="700">Customer journey — discovery to purchase</text>
    <!-- stage columns -->
    <g fill="#16140f" font-size="15" font-weight="700" text-anchor="middle">
      <text x="190" y="100">Discover</text><text x="470" y="100">Browse</text><text x="750" y="100">Choose size</text><text x="1030" y="100">Checkout</text><text x="1290" y="100">Post-purchase</text>
    </g>
    <line x1="60" y1="120" x2="1340" y2="120" stroke="#e7e1d6"/>
    <!-- emotion curve -->
    <polyline points="190,250 470,300 750,360 1030,330 1290,210" fill="none" stroke="#E1130E" stroke-width="4"/>
    <g fill="#E1130E"><circle cx="190" cy="250" r="7"/><circle cx="470" cy="300" r="7"/><circle cx="750" cy="360" r="7"/><circle cx="1030" cy="330" r="7"/><circle cx="1290" cy="210" r="7"/></g>
    <text x="60" y="200" fill="#a39d92" font-size="12">😀 positive</text>
    <text x="60" y="420" fill="#a39d92" font-size="12">😟 friction</text>
    <!-- sticky notes -->
    <g font-size="13" fill="#16140f">
      <g transform="translate(120,400)"><rect width="150" height="86" rx="8" fill="#fde7a6"/><text x="14" y="28">“Too many</text><text x="14" y="48">banners on</text><text x="14" y="68">the home tab.”</text></g>
      <g transform="translate(400,410)"><rect width="150" height="86" rx="8" fill="#fde7a6"/><text x="14" y="28">Inconsistent</text><text x="14" y="48">card sizes hurt</text><text x="14" y="68">scannability.</text></g>
      <g transform="translate(680,408)"><rect width="160" height="86" rx="8" fill="#f6c9c6"/><text x="14" y="28">Size doubt =</text><text x="14" y="48">biggest cause of</text><text x="14" y="68">abandonment.</text></g>
      <g transform="translate(970,400)"><rect width="150" height="86" rx="8" fill="#fde7a6"/><text x="14" y="28">Checkout has</text><text x="14" y="48">one step too</text><text x="14" y="68">many.</text></g>
    </g>
  </g>

  <text x="100" y="930" fill="#8a847c" font-size="16">Findings shaped design decisions across multiple feature cycles — a shared, evidence-based view of where users dropped off.</text>
</svg>
