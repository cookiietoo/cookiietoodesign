<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="24" stdDeviation="36" flood-color="#16140f" flood-opacity="0.16"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="#f4f1ea"/>
  <circle cx="270" cy="800" r="240" fill="#e7eef6"/>
  <text x="110" y="150" fill="#1763a6" font-size="20" letter-spacing="5" font-weight="700">SAUDI ELECTRIC COMPANY — B2B PORTAL</text>
  <text x="106" y="290" fill="#16140f" font-size="84" font-weight="700" letter-spacing="-3">Enterprise</text>
  <text x="106" y="380" fill="#16140f" font-size="84" font-weight="700" letter-spacing="-3">electricity</text>
  <text x="106" y="470" fill="#16140f" font-size="84" font-weight="700" letter-spacing="-3">connections,</text>
  <text x="106" y="560" fill="#1763a6" font-size="84" font-weight="700" letter-spacing="-3">simplified.</text>
  <text x="110" y="630" fill="#8a847c" font-size="24">Government &amp; commercial clients · multi-step workflows</text>

  <!-- browser window -->
  <g transform="translate(720,210)" filter="url(#sh)">
    <rect width="780" height="600" rx="18" fill="#ffffff"/>
    <rect width="780" height="46" rx="18" fill="#eef1ee"/><rect y="28" width="780" height="18" fill="#eef1ee"/>
    <circle cx="28" cy="23" r="6" fill="#d9d4ca"/><circle cx="48" cy="23" r="6" fill="#d9d4ca"/><circle cx="68" cy="23" r="6" fill="#d9d4ca"/>
    <rect x="110" y="12" width="430" height="22" rx="11" fill="#ffffff"/><text x="126" y="28" fill="#a39d92" font-size="12">portal.sec.com.sa / connections</text>
    <!-- sidebar -->
    <rect x="0" y="46" width="180" height="554" fill="#14304a"/>
    <text x="24" y="86" fill="#ffffff" font-size="16" font-weight="700">SEC Portal</text>
    <g fill="#cdd9e6" font-size="13">
      <rect x="16" y="110" width="148" height="34" rx="8" fill="#1763a6"/><text x="34" y="132" fill="#fff">Dashboard</text>
      <text x="34" y="172">Applications</text>
      <text x="34" y="208">Approvals</text>
      <text x="34" y="244">Sites &amp; load</text>
      <text x="34" y="280">Documents</text>
      <text x="34" y="316">Billing</text>
    </g>
    <!-- content -->
    <text x="208" y="92" fill="#16140f" font-size="20" font-weight="700">Connection requests</text>
    <!-- KPI cards -->
    <g>
      <rect x="208" y="112" width="172" height="92" rx="12" fill="#f3f6fa"/><text x="226" y="150" fill="#1763a6" font-size="34" font-weight="800">128</text><text x="226" y="180" fill="#8a847c" font-size="12">In review</text>
      <rect x="392" y="112" width="172" height="92" rx="12" fill="#eefaf4"/><text x="410" y="150" fill="#2e9e6b" font-size="34" font-weight="800">86%</text><text x="410" y="180" fill="#8a847c" font-size="12">Approval rate</text>
      <rect x="576" y="112" width="172" height="92" rx="12" fill="#f3f6fa"/><text x="594" y="150" fill="#1763a6" font-size="34" font-weight="800">4.2d</text><text x="594" y="180" fill="#8a847c" font-size="12">Avg. cycle time</text>
    </g>
    <!-- table -->
    <rect x="208" y="224" width="540" height="356" rx="12" fill="#ffffff" stroke="#ebe6dc"/>
    <rect x="208" y="224" width="540" height="40" rx="12" fill="#f7f4ee"/><rect x="208" y="248" width="540" height="16" fill="#f7f4ee"/>
    <g fill="#8a847c" font-size="11" font-weight="700"><text x="226" y="250">REQUEST</text><text x="420" y="250">CLIENT</text><text x="560" y="250">STATUS</text></g>
    <g font-size="12" fill="#16140f">
      <text x="226" y="296">#SEC-90412</text><text x="420" y="296" fill="#8a847c">Riyadh Dev. Co.</text><rect x="560" y="284" width="92" height="20" rx="10" fill="#eefaf4"/><text x="606" y="298" fill="#2e9e6b" text-anchor="middle" font-size="11">Approved</text>
      <text x="226" y="336">#SEC-90418</text><text x="420" y="336" fill="#8a847c">Min. of Housing</text><rect x="560" y="324" width="92" height="20" rx="10" fill="#fff3da"/><text x="606" y="338" fill="#b8860b" text-anchor="middle" font-size="11">In review</text>
      <text x="226" y="376">#SEC-90421</text><text x="420" y="376" fill="#8a847c">NEOM Logistics</text><rect x="560" y="364" width="92" height="20" rx="10" fill="#e7eef6"/><text x="606" y="378" fill="#1763a6" text-anchor="middle" font-size="11">Submitted</text>
      <text x="226" y="416">#SEC-90425</text><text x="420" y="416" fill="#8a847c">Aramco Facilities</text><rect x="560" y="404" width="92" height="20" rx="10" fill="#fff3da"/><text x="606" y="418" fill="#b8860b" text-anchor="middle" font-size="11">In review</text>
      <text x="226" y="456">#SEC-90430</text><text x="420" y="456" fill="#8a847c">Jeddah Port Auth.</text><rect x="560" y="444" width="92" height="20" rx="10" fill="#eefaf4"/><text x="606" y="458" fill="#2e9e6b" text-anchor="middle" font-size="11">Approved</text>
      <line x1="226" y1="476" x2="730" y2="476" stroke="#f0ebe1"/>
      <text x="226" y="512" fill="#8a847c">#SEC-90433</text><text x="420" y="512" fill="#c9c3b8">Tabuk Industrial</text><rect x="560" y="500" width="92" height="20" rx="10" fill="#f2efe8"/><text x="606" y="514" fill="#a39d92" text-anchor="middle" font-size="11">Draft</text>
    </g>
  </g>
