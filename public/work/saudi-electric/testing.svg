<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#16140f" flood-opacity="0.10"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="#f4f1ea"/>
  <text x="100" y="100" fill="#1763a6" font-size="18" letter-spacing="5" font-weight="700">PROTOTYPING &amp; TESTING</text>
  <text x="98" y="150" fill="#16140f" font-size="44" font-weight="700" letter-spacing="-1">Finding drop-off points, fixing them before production</text>

  <!-- funnel -->
  <g transform="translate(100,230)" filter="url(#sh)">
    <rect width="760" height="600" rx="20" fill="#fff"/>
    <text x="36" y="56" fill="#16140f" font-size="18" font-weight="700">Application → approval funnel</text>
    <text x="36" y="84" fill="#8a847c" font-size="13">Before vs after iterative prototyping &amp; moderated testing</text>
    <!-- stages -->
    <g font-size="13" fill="#16140f">
      <!-- stage rows: before (light) vs after (blue) bars -->
      <g transform="translate(36,120)">
        <text x="0" y="-2" font-weight="600">Start application</text>
        <rect x="0" y="8" width="680" height="22" rx="6" fill="#e7eef6"/><rect x="0" y="8" width="680" height="22" rx="6" fill="#cdddee"/><rect x="0" y="34" width="680" height="22" rx="6" fill="#1763a6"/>
      </g>
      <g transform="translate(36,200)">
        <text x="0" y="-2" font-weight="600">Complete site &amp; load</text>
        <rect x="0" y="8" width="500" height="22" rx="6" fill="#cdddee"/><rect x="0" y="34" width="618" height="22" rx="6" fill="#1763a6"/>
      </g>
      <g transform="translate(36,280)">
        <text x="0" y="-2" font-weight="600">Upload documents</text>
        <rect x="0" y="8" width="360" height="22" rx="6" fill="#cdddee"/><rect x="0" y="34" width="560" height="22" rx="6" fill="#1763a6"/>
      </g>
      <g transform="translate(36,360)">
        <text x="0" y="-2" font-weight="600">Submit for review</text>
        <rect x="0" y="8" width="250" height="22" rx="6" fill="#cdddee"/><rect x="0" y="34" width="512" height="22" rx="6" fill="#2e9e6b"/>
      </g>
      <g transform="translate(36,450)">
        <rect width="18" height="18" rx="4" fill="#cdddee"/><text x="28" y="14" fill="#8a847c">Before</text>
        <rect x="120" width="18" height="18" rx="4" fill="#1763a6"/><text x="148" y="14" fill="#8a847c">After</text>
        <text x="360" y="14" fill="#c0392b" font-size="13">Critical drop-off at documents &amp; submit — resolved.</text>
      </g>
    </g>
    <text x="36" y="540" fill="#8a847c" font-size="13">Structured iterative prototyping · moderated usability testing with real users.</text>
  </g>

  <!-- big metric -->
  <g transform="translate(920,230)">
    <g filter="url(#sh)"><rect width="580" height="290" rx="20" fill="#14304a"/>
      <text x="40" y="120" fill="#ffffff" font-size="120" font-weight="800">+12%</text>
      <text x="42" y="170" fill="#7fb2d8" font-size="22" font-weight="600">task success rate</text>
      <text x="42" y="210" fill="#cdd9e6" font-size="15">across the portal's application and approval flows</text>
      <rect x="42" y="232" width="160" height="34" rx="17" fill="#2e9e6b"/><text x="122" y="255" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">Resolved pre-production</text>
    </g>
    <g transform="translate(0,320)" filter="url(#sh)"><rect width="280" height="180" rx="16" fill="#fff"/><text x="28" y="80" fill="#1763a6" font-size="46" font-weight="800">15+</text><text x="28" y="118" fill="#16140f" font-size="15" font-weight="600">stakeholders</text><text x="28" y="142" fill="#8a847c" font-size="13">aligned into one flow</text></g>
    <g transform="translate(300,320)" filter="url(#sh)"><rect width="280" height="180" rx="16" fill="#fff"/><text x="28" y="80" fill="#2e9e6b" font-size="46" font-weight="800">Gov +</text><text x="28" y="118" fill="#16140f" font-size="15" font-weight="600">commercial</text><text x="28" y="142" fill="#8a847c" font-size="13">at enterprise scale</text></g>
  </g>
</svg>
