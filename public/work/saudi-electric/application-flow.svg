<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#16140f" flood-opacity="0.14"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="#f4f1ea"/>
  <text x="100" y="100" fill="#1763a6" font-size="18" letter-spacing="5" font-weight="700">THE APPLICATION FLOW</text>
  <text x="98" y="150" fill="#16140f" font-size="44" font-weight="700" letter-spacing="-1">A guided wizard for a complex enterprise request</text>

  <!-- desktop window -->
  <g transform="translate(150,210)" filter="url(#sh)">
    <rect width="1300" height="640" rx="18" fill="#ffffff"/>
    <rect width="1300" height="46" rx="18" fill="#eef1ee"/><rect y="28" width="1300" height="18" fill="#eef1ee"/>
    <circle cx="28" cy="23" r="6" fill="#d9d4ca"/><circle cx="48" cy="23" r="6" fill="#d9d4ca"/><circle cx="68" cy="23" r="6" fill="#d9d4ca"/>
    <text x="650" y="28" fill="#a39d92" font-size="12" text-anchor="middle">New connection application</text>

    <!-- step rail -->
    <rect x="0" y="46" width="320" height="594" fill="#f7f9fc"/>
    <text x="36" y="92" fill="#8a847c" font-size="12" letter-spacing="2">APPLICATION · STEP 2 OF 5</text>
    <line x1="48" y1="120" x2="48" y2="470" stroke="#dbe6f1" stroke-width="2"/>
    <g font-size="14">
      <circle cx="48" cy="130" r="13" fill="#2e9e6b"/><text x="48" y="135" fill="#fff" text-anchor="middle" font-size="12">✓</text><text x="76" y="135" fill="#16140f" font-weight="600">Applicant details</text>
      <circle cx="48" cy="210" r="13" fill="#1763a6"/><text x="48" y="215" fill="#fff" text-anchor="middle" font-size="12">2</text><text x="76" y="215" fill="#1763a6" font-weight="700">Site &amp; requested load</text>
      <circle cx="48" cy="290" r="13" fill="#fff" stroke="#cbd8e6" stroke-width="2"/><text x="76" y="295" fill="#a39d92">Documents</text>
      <circle cx="48" cy="370" r="13" fill="#fff" stroke="#cbd8e6" stroke-width="2"/><text x="76" y="375" fill="#a39d92">Review</text>
      <circle cx="48" cy="450" r="13" fill="#fff" stroke="#cbd8e6" stroke-width="2"/><text x="76" y="455" fill="#a39d92">Submit</text>
    </g>
    <rect x="36" y="520" width="248" height="80" rx="12" fill="#eefaf4"/><text x="56" y="552" fill="#2e9e6b" font-size="13" font-weight="700">Progress saved</text><text x="56" y="574" fill="#8a847c" font-size="12">Resume any time — no lost work.</text>

    <!-- form panel -->
    <g transform="translate(320,46)">
      <text x="48" y="56" fill="#16140f" font-size="22" font-weight="700">Site &amp; requested load</text>
      <text x="48" y="84" fill="#8a847c" font-size="13">Tell us about the connection location and capacity.</text>

      <text x="48" y="130" fill="#16140f" font-size="13" font-weight="600">Site address</text>
      <rect x="48" y="142" width="900" height="46" rx="10" fill="#f4f6f9" stroke="#e6e9ee"/><text x="66" y="170" fill="#16140f" font-size="14">King Fahd Industrial District, Plot 22</text>

      <text x="48" y="218" fill="#16140f" font-size="13" font-weight="600">Connection type</text>
      <rect x="48" y="230" width="290" height="56" rx="10" fill="#fff" stroke="#1763a6" stroke-width="2"/><circle cx="74" cy="258" r="8" fill="#1763a6"/><text x="94" y="256" font-size="14" font-weight="600">Commercial</text><text x="94" y="274" font-size="11" fill="#8a847c">11 kV / 13.8 kV</text>
      <rect x="354" y="230" width="290" height="56" rx="10" fill="#f7f9fc"/><circle cx="380" cy="258" r="8" fill="none" stroke="#c3ccd6" stroke-width="2"/><text x="400" y="256" font-size="14" font-weight="600">Government</text><text x="400" y="274" font-size="11" fill="#8a847c">Dedicated feeder</text>
      <rect x="660" y="230" width="288" height="56" rx="10" fill="#f7f9fc"/><circle cx="686" cy="258" r="8" fill="none" stroke="#c3ccd6" stroke-width="2"/><text x="706" y="256" font-size="14" font-weight="600">Industrial</text><text x="706" y="274" font-size="11" fill="#8a847c">High-tension</text>

      <text x="48" y="330" fill="#16140f" font-size="13" font-weight="600">Requested load (kVA)</text>
      <rect x="48" y="342" width="430" height="46" rx="10" fill="#f4f6f9" stroke="#e6e9ee"/><text x="66" y="370" fill="#16140f" font-size="14">2,500</text>
      <text x="510" y="330" fill="#16140f" font-size="13" font-weight="600">Expected energisation</text>
      <rect x="510" y="342" width="438" height="46" rx="10" fill="#f4f6f9" stroke="#e6e9ee"/><text x="528" y="370" fill="#16140f" font-size="14">Q3 2026</text>

      <!-- inline help -->
      <rect x="48" y="412" width="900" height="58" rx="10" fill="#e7eef6"/><circle cx="74" cy="441" r="11" fill="#1763a6"/><text x="74" y="446" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">i</text><text x="96" y="438" fill="#16140f" font-size="13" font-weight="600">Not sure about load?</text><text x="96" y="458" fill="#8a847c" font-size="12">Use the estimator — based on site type and area, with regulatory limits applied automatically.</text>

      <!-- footer -->
      <line x1="48" y1="510" x2="948" y2="510" stroke="#eef0f3"/>
      <rect x="48" y="528" width="120" height="48" rx="24" fill="#fff" stroke="#cbd8e6" stroke-width="2"/><text x="108" y="557" fill="#16140f" font-size="14" text-anchor="middle" font-weight="600">Back</text>
      <rect x="800" y="528" width="148" height="48" rx="24" fill="#1763a6"/><text x="874" y="557" fill="#fff" font-size="14" text-anchor="middle" font-weight="600">Continue</text>
    </g>
  </g>
</svg>
