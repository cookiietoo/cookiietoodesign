<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#16140f" flood-opacity="0.10"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="#f4f1ea"/>
  <text x="100" y="100" fill="#1763a6" font-size="18" letter-spacing="5" font-weight="700">APPROVAL &amp; STAKEHOLDERS</text>
  <text x="98" y="150" fill="#16140f" font-size="44" font-weight="700" letter-spacing="-1">Clear owners, parallel reviews, tracked SLAs</text>

  <!-- pipeline -->
  <g transform="translate(0,320)">
    <line x1="180" y1="0" x2="1420" y2="0" stroke="#cbd8e6" stroke-width="3"/>
    <!-- nodes -->
    <g text-anchor="middle">
      <!-- submitted -->
      <g transform="translate(220,0)"><circle r="34" fill="#1763a6"/><path d="M-10 0 l8 8 l14 -16" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text y="74" fill="#16140f" font-size="16" font-weight="700">Submitted</text><text y="98" fill="#8a847c" font-size="12">Applicant</text></g>
      <!-- technical -->
      <g transform="translate(520,0)"><circle r="34" fill="#fff" stroke="#1763a6" stroke-width="3"/><text y="6" fill="#1763a6" font-size="20" font-weight="800">2</text><text y="74" fill="#16140f" font-size="16" font-weight="700">Technical review</text><text y="98" fill="#8a847c" font-size="12">Engineering</text></g>
      <!-- regulatory -->
      <g transform="translate(820,0)"><circle r="34" fill="#fff" stroke="#1763a6" stroke-width="3"/><text y="6" fill="#1763a6" font-size="20" font-weight="800">3</text><text y="74" fill="#16140f" font-size="16" font-weight="700">Regulatory check</text><text y="98" fill="#8a847c" font-size="12">Gov. stakeholders</text></g>
      <!-- approval -->
      <g transform="translate(1120,0)"><circle r="34" fill="#fff" stroke="#cbd8e6" stroke-width="3"/><text y="6" fill="#8a847c" font-size="20" font-weight="800">4</text><text y="74" fill="#16140f" font-size="16" font-weight="700">Approval</text><text y="98" fill="#8a847c" font-size="12">SLA-tracked</text></g>
      <!-- scheduled -->
      <g transform="translate(1380,0)"><circle r="34" fill="#2e9e6b"/><text y="6" fill="#fff" font-size="22">⚡</text><text y="74" fill="#16140f" font-size="16" font-weight="700">Scheduled</text><text y="98" fill="#8a847c" font-size="12">Connection</text></g>
    </g>
    <!-- rework branch -->
    <path d="M820 -34 C 820 -150, 520 -150, 520 -34" fill="none" stroke="#d98b85" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="670" y="-150" fill="#c0392b" font-size="13" text-anchor="middle">Request changes → applicant</text>
    <!-- SLA chips -->
    <g font-size="12" text-anchor="middle">
      <rect x="332" y="-18" width="76" height="24" rx="12" fill="#eefaf4"/><text x="370" y="-1" fill="#2e9e6b">2 days</text>
      <rect x="632" y="-18" width="76" height="24" rx="12" fill="#fff3da"/><text x="670" y="-1" fill="#b8860b">3 days</text>
      <rect x="932" y="-18" width="76" height="24" rx="12" fill="#e7eef6"/><text x="970" y="-1" fill="#1763a6">1 day</text>
    </g>
  </g>

  <!-- collaboration cards -->
  <g transform="translate(100,560)">
    <g filter="url(#sh)"><rect width="430" height="170" rx="16" fill="#fff"/><text x="28" y="48" fill="#16140f" font-size="18" font-weight="700">Cross-functional, agile</text><text x="28" y="84" fill="#8a847c" font-size="15">Embedded with developers, PMs, and</text><text x="28" y="108" fill="#8a847c" font-size="15">government stakeholders in sprint cadence.</text><text x="28" y="146" fill="#1763a6" font-size="13" font-weight="700">Shipped accurately &amp; on schedule</text></g>
    <g transform="translate(470,0)" filter="url(#sh)"><rect width="430" height="170" rx="16" fill="#fff"/><text x="28" y="48" fill="#16140f" font-size="18" font-weight="700">Regulation → design</text><text x="28" y="84" fill="#8a847c" font-size="15">Translated complex regulatory and</text><text x="28" y="108" fill="#8a847c" font-size="15">operational requirements into usable flows.</text><text x="28" y="146" fill="#1763a6" font-size="13" font-weight="700">Compliant by design</text></g>
    <g transform="translate(940,0)" filter="url(#sh)"><rect width="430" height="170" rx="16" fill="#fff"/><text x="28" y="48" fill="#16140f" font-size="18" font-weight="700">Visibility for all</text><text x="28" y="84" fill="#8a847c" font-size="15">Every party sees status, owner, and SLA —</text><text x="28" y="108" fill="#8a847c" font-size="15">no more email chains or lost steps.</text><text x="28" y="146" fill="#1763a6" font-size="13" font-weight="700">One source of truth</text></g>
  </g>
</svg>
