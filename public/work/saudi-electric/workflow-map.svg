<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="1600" height="1000" fill="#f4f1ea"/>
  <text x="100" y="100" fill="#1763a6" font-size="18" letter-spacing="5" font-weight="700">MAPPING THE WORKFLOW</text>
  <text x="98" y="150" fill="#16140f" font-size="44" font-weight="700" letter-spacing="-1">From a tangled process to a clear, linear path</text>

  <!-- BEFORE: tangled -->
  <g transform="translate(100,230)">
    <rect width="640" height="600" rx="20" fill="#fbf3f2"/>
    <text x="32" y="56" fill="#c0392b" font-size="18" font-weight="700" letter-spacing="2">BEFORE — 15+ STAKEHOLDERS, WEEKS</text>
    <!-- tangled edges -->
    <g stroke="#d98b85" stroke-width="2" fill="none" opacity="0.9">
      <path d="M120 160 C 300 100, 360 320, 520 200"/>
      <path d="M120 160 C 250 300, 180 420, 420 380"/>
      <path d="M520 200 C 380 260, 540 420, 300 480"/>
      <path d="M300 480 C 180 420, 480 520, 540 460"/>
      <path d="M420 380 C 540 320, 200 200, 120 320"/>
      <path d="M120 320 C 320 380, 420 160, 520 360"/>
      <path d="M200 540 C 360 480, 120 420, 460 540"/>
    </g>
    <g font-size="12" fill="#16140f" text-anchor="middle">
      <g><circle cx="120" cy="160" r="30" fill="#fff" stroke="#d98b85"/><text x="120" y="164">Apply</text></g>
      <g><circle cx="520" cy="200" r="30" fill="#fff" stroke="#d98b85"/><text x="520" y="204">Legal</text></g>
      <g><circle cx="420" cy="380" r="30" fill="#fff" stroke="#d98b85"/><text x="420" y="384">Finance</text></g>
      <g><circle cx="120" cy="320" r="30" fill="#fff" stroke="#d98b85"/><text x="120" y="324">Survey</text></g>
      <g><circle cx="300" cy="480" r="30" fill="#fff" stroke="#d98b85"/><text x="300" y="484">Tech</text></g>
      <g><circle cx="540" cy="460" r="30" fill="#fff" stroke="#d98b85"/><text x="540" y="464">Gov.</text></g>
      <g><circle cx="200" cy="540" r="30" fill="#fff" stroke="#d98b85"/><text x="200" y="544">Email</text></g>
    </g>
    <text x="32" y="572" fill="#8a847c" font-size="13">Spreadsheets, email chains, no single source of truth.</text>
  </g>

  <!-- arrow -->
  <g transform="translate(800,530)"><line x1="-30" y1="0" x2="40" y2="0" stroke="#1763a6" stroke-width="5"/><path d="M40 0 L22 -12 L22 12 Z" fill="#1763a6"/></g>

  <!-- AFTER: linear -->
  <g transform="translate(860,230)">
    <rect width="640" height="600" rx="20" fill="#eef4f9"/>
    <text x="32" y="56" fill="#1763a6" font-size="18" font-weight="700" letter-spacing="2">AFTER — GUIDED, TRACKABLE FLOW</text>
    <!-- vertical stepper -->
    <line x1="80" y1="110" x2="80" y2="520" stroke="#bcd2e6" stroke-width="3"/>
    <g font-size="15" fill="#16140f">
      <g><circle cx="80" cy="130" r="16" fill="#2e9e6b"/><text x="80" y="135" fill="#fff" text-anchor="middle" font-size="13">✓</text><text x="120" y="128" font-weight="700">Application details</text><text x="120" y="150" fill="#8a847c" font-size="12">Applicant, site, requested load</text></g>
      <g><circle cx="80" cy="230" r="16" fill="#2e9e6b"/><text x="80" y="235" fill="#fff" text-anchor="middle" font-size="13">✓</text><text x="120" y="228" font-weight="700">Documents &amp; compliance</text><text x="120" y="250" fill="#8a847c" font-size="12">Auto-validated against requirements</text></g>
      <g><circle cx="80" cy="330" r="16" fill="#1763a6"/><text x="80" y="335" fill="#fff" text-anchor="middle" font-size="12">3</text><text x="120" y="328" font-weight="700">Technical &amp; regulatory review</text><text x="120" y="350" fill="#8a847c" font-size="12">Parallel review with clear owners</text></g>
      <g><circle cx="80" cy="430" r="16" fill="#fff" stroke="#bcd2e6" stroke-width="3"/><text x="120" y="428" font-weight="700" fill="#8a847c">Approval</text><text x="120" y="450" fill="#a39d92" font-size="12">SLA-tracked decision</text></g>
      <g><circle cx="80" cy="520" r="16" fill="#fff" stroke="#bcd2e6" stroke-width="3"/><text x="120" y="518" font-weight="700" fill="#8a847c">Connection scheduled</text></g>
    </g>
  </g>
</svg>
